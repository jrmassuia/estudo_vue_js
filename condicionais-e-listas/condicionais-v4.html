<meta charset="UTF-8" />
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<div id="app">
  <template v-if="logado">
    <p>Usuário Logado: {{ nome }}</p>
    <p>Perfil: Admin</p>
  </template>

  <p v-else-if="anonimo">Usuário Anônimo</p>
  <p v-else>Nenhum usuário logado</p>

  <button @click="logado = !logado">{{ logado ? "Deslogar" : "Logar" }}</button>

  <input type="checkbox" id="anonimo" v-model="anonimo" />
  <label for="anonimo">Anônimo</label>

  <hr />

  <footer v-show="logado">Exemplo de Condicionais com Vue.js</footer>
</div>

<script>
  new Vue({
    el: "#app",
    data: {
      nome: "João",
      logado: false,
      anonimo: true,
    },
  });
</script>
