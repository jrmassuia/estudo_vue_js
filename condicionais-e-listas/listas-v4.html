<meta charset="UTF-8" />
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<div id="app">

    <ul>
        <li v-for="(cor, i) in cores" :key="i">{{ i }} - {{ cor }}</li>
    </ul>
    <button @click="cores.push('roxo')">Adicionar roxo</button>

    <template v-for="(pessoa, i) in pessoas">
        <div>
            <h3>{{ pessoa.nome }}</h3>
            <p>Idade: {{ pessoa.idade }}</p>
            <p>Peso: {{ pessoa.peso }}</p>
        </div>
    </template>
    <hr>
    <ul>
        <li v-for="(pessoa, i) in pessoas">
            {{ i }} - {{ pessoa.nome }}
            <div v-for="(valor, chave) in pessoa">
                {{ chave }}: {{ valor }}
            </div>
        </li>
    </ul>
    <hr>
    <div v-for="n in 10">{{ n }}</div>
</div>

<script>
  new Vue({
    el: "#app",
    data: {
        cores: ['vermelho', 'verde', 'azul','amarelo'],
        pessoas: [
            { nome: 'João', idade: 30, peso: 59  },
            { nome: 'Maria', idade: 25, peso: 65 },
            { nome: 'Pedro', idade: 35, peso: 70 },
        ],
    },
  });
</script>

<style>
    li {
        list-style: none;
        margin: 5px 0;
        padding: 0;
    }
</style>
