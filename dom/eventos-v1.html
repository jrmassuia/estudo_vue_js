<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<div id="app">
  <p>{{contator}}</p>
  <button v-on:click="somar">Somar 1</button>
</div>

<script>
  new Vue({
    el: "#app",
    data: {
      contator: 0,
    },
    methods: {
      somar(event) {
        this.contator++;
      },
    },
  });
</script>
