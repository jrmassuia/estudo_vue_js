<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<div id="app">
  <p>{{contator}}</p>
  <button v-on:click="somar(5, $event)">Somar 1</button>
  <p v-on:mousemove="atualizarMouse">
    Mouse: {{mouseX}}, {{mouseY}} 
    <span v-on:mousemove="parar">PARAR AQUI!!!</span>
  </p>
  <a href="https://www.google.com" v-on:click.prevent="naoNavegar">Google</a>
  <hr />
  <input type="text" v-on:keyup.enter="exibirAlerta" />
</div>

<script>
  new Vue({
    el: "#app",
    data: {
      contator: 0,
      mouseX: 0,
      mouseY: 0,
    },
    methods: {
      somar(valor, event) {
        console.log(event);
        this.contator += valor;
      },
      atualizarMouse(event) {
        this.mouseX = event.clientX;
        this.mouseY = event.clientY;
      },
      parar(event) {
        event.stopPropagation();
      },
      naoNavegar(event) {
        console.log("Navegação Prevenida");
      },
      exibirAlerta(event) {
        console.log("Tecla pressionada:", event.key);
      },
    },
  });
</script>
