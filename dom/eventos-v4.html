<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<div id="app">
  <p>{{contator}}</p>
  <button v-on:click="somar(5, $event)">Somar 1</button>
  <p v-on:mousemove="atualizarMouse">
    Mouse: {{mouseX}}, {{mouseY}} <spam v-on:mousemove="parar">PARAR AQUI!!!</spam>
  </p>
  <a href="https://www.google.com" v-on:click.prevent="naoNavegar">Google</a>
</div>

<script>
  new Vue({
    el: "#app",
    data: {
      contator: 0,
      mouseX: 0,
      mouseY: 0,
    },
    methods: {
      somar(valor, event) {
        console.log(event);
        this.contator += valor;
      },
      atualizarMouse(event) {
        this.mouseX = event.clientX;
        this.mouseY = event.clientY;
      },
      naoNavegar(event) {
        console.log
      },
    },
  });
</script>
